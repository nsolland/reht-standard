name: Validate REHT Standard

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check jsonschema==4.23.0
      - run: python tests/validate_examples.py
      - name: Validate all JSON files parse
        run: python - <<'PY'
          import json
          from pathlib import Path
          for path in Path('.').rglob('*.json'):
              with path.open(encoding='utf-8') as handle:
                  json.load(handle)
              print(path)
          PY
